cache:
    paths:
        - vendor/

variables:
    POSTGRES_DB: pollaris
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres

    NODOCKER: true
    COVERAGE: --coverage-text
    DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/pollaris?serverVersion=15&charset=utf8"

workflow:
    rules:
        - if: $CI_PIPELINE_SOURCE == 'merge_request_event'

services:
    - postgres:15-alpine

before_script:
    - apt-get update
    - apt-get install -y git libicu-dev libpq-dev libzip-dev locales unzip
    - pecl install xdebug
    - docker-php-ext-configure intl
    - docker-php-ext-install -j$(nproc) intl pcntl pdo pdo_pgsql zip
    - docker-php-ext-enable xdebug
    - echo "xdebug.mode=coverage" >> /usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - make install INSTALLER=composer

test:8.2:
    image: php:8.2-cli
    stage: test
    script:
        - make lint
        - make test

test:8.3:
    image: php:8.3-cli
    stage: test
    script:
        - make lint
        - make test

test:8.4:
    image: php:8.4-cli
    stage: test
    script:
        - make lint
        - make test
